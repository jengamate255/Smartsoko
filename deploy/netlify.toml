[build]
  publish = "web"
  command = "echo 'Static build complete'"

[build.environment]
  NODE_VERSION = "18"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/web/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/customer"
  to = "/web/customer.html"
  status = 200

[[redirects]]
  from = "/supabase"
  to = "/web/supabase.html"
  status = 200

[[redirects]]
  from = "/test-supabase"
  to = "/web/test-supabase.html"
  status = 200

[[redirects]]
  from = "/restaurant"
  to = "/web/restaurant.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/web/index.html"
  status = 200
