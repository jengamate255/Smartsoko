[build]
  publish = "web"
  command = "echo 'Static build complete'"

[build.environment]
  NODE_VERSION = "18"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "*.@(js|css|png|jpg|jpeg|gif|ico|svg)"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Direct file routes (no /web/ prefix needed)
[[redirects]]
  from = "/customer"
  to = "/customer.html"
  status = 200

[[redirects]]
  from = "/supabase"
  to = "/supabase.html"
  status = 200

[[redirects]]
  from = "/test-supabase"
  to = "/test-supabase.html"
  status = 200

[[redirects]]
  from = "/restaurant"
  to = "/restaurant.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/index.html"
  status = 200

# Fallback for SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
